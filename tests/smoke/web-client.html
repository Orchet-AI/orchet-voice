<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orchet Phase 2 Voice Smoke</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 760px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-top: 1rem;
      }
      input,
      textarea,
      button {
        box-sizing: border-box;
        font: inherit;
        width: 100%;
      }
      textarea {
        min-height: 7rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.7rem 1rem;
      }
      button:disabled {
        opacity: 0.5;
      }
      pre {
        background: #111;
        color: #f5f5f5;
        min-height: 12rem;
        overflow: auto;
        padding: 1rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Phase 2 Voice Smoke</h1>

    <label for="serviceUrl">Voice service URL</label>
    <input id="serviceUrl" value="https://orchet-voice.fly.dev" />

    <label for="jwt">Supabase access token</label>
    <textarea id="jwt" spellcheck="false"></textarea>

    <button id="start">Connect</button>
    <button id="stop" disabled>Stop</button>
    <pre id="log"></pre>

    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/bundle.min.js"></script>
    <script>
      const logEl = document.querySelector("#log");
      const startButton = document.querySelector("#start");
      const stopButton = document.querySelector("#stop");
      let call = null;
      let micVad = null;
      let currentTurnId = null;
      let voiceSessionId = null;

      const log = (line) => {
        const stamp = new Date().toISOString();
        logEl.textContent += `[${stamp}] ${line}\n`;
      };

      const newTurnId = () => {
        if (crypto.randomUUID) {
          return `turn_${crypto.randomUUID()}`;
        }
        return `turn_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      };

      const sendVadEvent = (state) => {
        if (!call || !voiceSessionId) {
          return;
        }
        if (state === "speech_started") {
          currentTurnId = newTurnId();
        }
        call.sendAppMessage(
          {
            type: "barge_in",
            state,
            voice_session_id: voiceSessionId,
            turn_id: currentTurnId,
            client_kind: "web",
            client_sent_at: Date.now(),
          },
          "*",
        );
        log(`VAD ${state} turn_id=${currentTurnId}`);
      };

      const teardown = async () => {
        if (micVad) {
          micVad.pause();
          micVad = null;
        }
        if (call) {
          await call.leave();
          await call.destroy();
          call = null;
        }
        startButton.disabled = false;
        stopButton.disabled = true;
        log("Smoke stopped.");
      };

      startButton.addEventListener("click", async () => {
        const serviceUrl = document.querySelector("#serviceUrl").value.replace(/\/$/, "");
        const jwt = document.querySelector("#jwt").value.trim();
        if (!jwt) {
          log("Paste a Supabase access token first.");
          return;
        }

        startButton.disabled = true;
        const handshakeStart = performance.now();
        const response = await fetch(`${serviceUrl}/debug/echo`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${jwt}`,
          },
          body: JSON.stringify({
            client_kind: "web",
            ttl_seconds: 600,
          }),
        });
        if (!response.ok) {
          startButton.disabled = false;
          log(`signaling failed: ${response.status} ${await response.text()}`);
          return;
        }

        const session = await response.json();
        voiceSessionId = session.voice_session_id;
        log(`voice_session_id=${voiceSessionId}`);
        log(`room=${session.room_url}`);

        call = DailyIframe.createCallObject({
          audioSource: true,
          videoSource: false,
          subscribeToTracksAutomatically: true,
        });
        call.on("error", (event) => log(`Daily error: ${JSON.stringify(event)}`));
        call.on("joined-meeting", () => {
          log(`Daily joined in ${(performance.now() - handshakeStart).toFixed(0)} ms`);
        });
        call.on("participant-joined", (event) => {
          log(`participant joined: ${event.participant.user_name || event.participant.session_id}`);
        });
        call.on("app-message", (event) => {
          log(`app message: ${JSON.stringify(event.data)}`);
        });

        await call.join({ url: session.room_url, token: session.client_token });

        micVad = await vad.MicVAD.new({
          onSpeechStart: () => sendVadEvent("speech_started"),
          onSpeechEnd: () => sendVadEvent("speech_ended"),
        });
        micVad.start();
        stopButton.disabled = false;
        log('Ask: "What time is it in Tokyo?" then interrupt with "what about London?"');
      });

      stopButton.addEventListener("click", () => {
        teardown().catch((error) => log(`teardown failed: ${error}`));
      });

      window.addEventListener("beforeunload", () => {
        if (micVad) {
          micVad.pause();
        }
        if (call) {
          call.leave();
        }
      });
    </script>
  </body>
</html>
