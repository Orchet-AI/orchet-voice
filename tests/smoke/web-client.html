<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orchet Phase 1 Echo Smoke</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 760px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-top: 1rem;
      }
      input,
      textarea,
      button {
        box-sizing: border-box;
        font: inherit;
        width: 100%;
      }
      textarea {
        min-height: 7rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.7rem 1rem;
      }
      pre {
        background: #111;
        color: #f5f5f5;
        min-height: 12rem;
        overflow: auto;
        padding: 1rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Phase 1 Echo Smoke</h1>

    <label for="serviceUrl">Voice service URL</label>
    <input id="serviceUrl" value="https://orchet-voice.fly.dev" />

    <label for="jwt">Supabase access token</label>
    <textarea id="jwt" spellcheck="false"></textarea>

    <button id="start">Connect and capture 5 seconds</button>
    <pre id="log"></pre>

    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    <script>
      const logEl = document.querySelector("#log");
      const log = (line) => {
        const stamp = new Date().toISOString();
        logEl.textContent += `[${stamp}] ${line}\n`;
      };

      document.querySelector("#start").addEventListener("click", async () => {
        const serviceUrl = document.querySelector("#serviceUrl").value.replace(/\/$/, "");
        const jwt = document.querySelector("#jwt").value.trim();
        if (!jwt) {
          log("Paste a Supabase access token first.");
          return;
        }

        const handshakeStart = performance.now();
        const response = await fetch(`${serviceUrl}/debug/echo`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${jwt}`,
          },
          body: JSON.stringify({
            client_kind: "web",
            ttl_seconds: 600,
          }),
        });
        if (!response.ok) {
          log(`signaling failed: ${response.status} ${await response.text()}`);
          return;
        }

        const session = await response.json();
        log(`voice_session_id=${session.voice_session_id}`);
        log(`room=${session.room_url}`);

        const call = DailyIframe.createCallObject({
          audioSource: true,
          videoSource: false,
          subscribeToTracksAutomatically: true,
        });
        call.on("error", (event) => log(`Daily error: ${JSON.stringify(event)}`));
        call.on("joined-meeting", () => {
          log(`Daily joined in ${(performance.now() - handshakeStart).toFixed(0)} ms`);
        });
        call.on("participant-joined", (event) => {
          log(`participant joined: ${event.participant.user_name || event.participant.session_id}`);
        });

        await call.join({ url: session.room_url, token: session.client_token });
        log("Mic capture active. Speak for 5 seconds; echoed audio should play back.");

        window.setTimeout(async () => {
          try {
            if (typeof call.getNetworkStats === "function") {
              const stats = await call.getNetworkStats();
              log(`Daily network stats: ${JSON.stringify(stats)}`);
            }
          } catch (error) {
            log(`network stats unavailable: ${error}`);
          }
          await call.leave();
          await call.destroy();
          log("Smoke complete.");
        }, 5000);
      });
    </script>
  </body>
</html>
